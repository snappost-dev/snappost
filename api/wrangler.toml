name = "snappost-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding (provisioning veritabanı)
[[d1_databases]]
binding = "DB"
database_name = "snappost-provisioning"
database_id = "d8c8583f-e604-44f0-8ead-7b0d53b4f151"

# Blog/medya (B1) — tek bucket, kiracı prefix: u{userId}/s{siteId}/…
# Oluşturma: wrangler r2 bucket create snappost-media
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "snappost-media"

# Worker içi rate limit (CF Rate Limit API; wrangler ≥ 4.36). PoP başına; IP paylaşımlı ağlarda dikkat.
# namespace_id: hesap içinde benzersiz tamsayı string. Panel WAF kuralları ile birlikte veya yedek olarak kullanılabilir.
[[ratelimits]]
name = "RL_AUTH_REGISTER"
namespace_id = "8849101"

[ratelimits.simple]
limit = 5
period = 60

[[ratelimits]]
name = "RL_AUTH_LOGIN"
namespace_id = "8849102"

[ratelimits.simple]
limit = 10
period = 60

[[ratelimits]]
name = "RL_PROVISION"
namespace_id = "8849103"

[ratelimits.simple]
limit = 3
period = 60

[vars]
CF_ACCOUNT_ID = "1094e722fe9d2b939e94a8ceb124d21b"
# Opsiyonel — virgülle ayrılmış e-postalar; boş veya satır yok = kayıt/giriş herkese açık
# ALLOWED_EMAILS = "alice@example.com,bob@example.com"
# Opsiyonel — kullanıcı başına en çok kaç blog (sites). Tanımsız = sınırsız
# MAX_SITES_PER_USER = "3"
# Opsiyonel — tarayıcı CORS Origin listesi (virgülle). Boş = localhost + snappost.dev + pages.dev varsayılanları
# CORS_ORIGINS = "https://snappost.dev,https://www.snappost.dev,https://snappost-landing.pages.dev"
# Opsiyonel — görsel yükleme üst sınırı (MB), 0.5–20, varsayılan 5
# MAX_MEDIA_UPLOAD_MB = "5"
# Opsiyonel — medya yanıt URL’leri ve yeni provision edilen dashboard SNAPPOST_API_URL için kamu API kökü (örn. https://snappost-api.xxx.workers.dev). Boş = istek origin’i (yerel provision’da dashboard upload’u kırabilir)
# SNAPPOST_API_PUBLIC_URL = "https://snappost-api.<subdomain>.workers.dev"
# Yerel test için /test/* — production’da eklemeyin
# ALLOW_TEST_ROUTES = "true"

# Secrets (wrangler secret put):
# CF_API_TOKEN
# JWT_SECRET
